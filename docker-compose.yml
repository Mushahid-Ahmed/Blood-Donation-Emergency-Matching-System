services:
  postgres:
    image: postgres:16-alpine
    container_name: bloodmatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: bloodmatch
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d bloodmatch"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
